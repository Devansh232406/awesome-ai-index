name: Auto-Merge Validated PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["Validate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'auto-merge')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr_number;
            if (context.payload.pull_request) {
              pr_number = context.payload.pull_request.number;
            } else if (context.payload.workflow_run) {
              const runs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: context.payload.workflow_run.head_branch,
              });
              if (runs.data.length > 0) pr_number = runs.data[0].number;
            }
            if (!pr_number) {
              core.info('No PR found, skipping');
              return;
            }
            core.setOutput('number', pr_number);

            // Check PR labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
            });
            const labelNames = labels.map(l => l.name);
            const isAutoMerge = labelNames.includes('auto-merge') || labelNames.includes('bot');
            core.setOutput('should_merge', isAutoMerge.toString());

            // Check all status checks passed
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request?.head?.sha || context.payload.workflow_run?.head_sha || '',
            });
            const allPassed = checks.check_runs.every(c => c.conclusion === 'success' || c.conclusion === 'skipped' || c.status === 'queued');
            core.setOutput('checks_passed', allPassed.toString());

      - name: Validate PR content
        if: steps.pr.outputs.number && steps.pr.outputs.should_merge == 'true'
        id: validate
        run: |
          echo "Running validation on PR #${{ steps.pr.outputs.number }}"
          # Run the repo's validate script if it exists
          if [ -f scripts/validate.py ]; then
            pip install requests python-dateutil
            python scripts/validate.py && echo "valid=true" >> $GITHUB_OUTPUT || echo "valid=false" >> $GITHUB_OUTPUT
          else
            echo "valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge
        if: |
          steps.pr.outputs.number &&
          steps.pr.outputs.should_merge == 'true' &&
          steps.pr.outputs.checks_passed == 'true' &&
          steps.validate.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = ${{ steps.pr.outputs.number }};
            core.info(`Merging PR #${pr_number}`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                merge_method: 'squash',
              });
              core.info(`Successfully merged PR #${pr_number}`);
            } catch (error) {
              core.warning(`Failed to merge PR #${pr_number}: ${error.message}`);
            }
