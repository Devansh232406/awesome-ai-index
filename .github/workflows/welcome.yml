name: Welcome New Contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to the Awesome AI Index! Thanks for opening your first issue.
            Please check our [Contributing Guide](CONTRIBUTING.md) for guidelines.
            We appreciate your help making this the best AI resource index.
          pr-message: |
            Welcome to the Awesome AI Index! Thanks for your first pull request.
            A maintainer will review it shortly. Please ensure your PR follows
            our [Contributing Guide](CONTRIBUTING.md).
